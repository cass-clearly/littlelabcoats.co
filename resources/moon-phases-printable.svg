<svg xmlns="http://www.w3.org/2000/svg" width="2550" height="3300" viewBox="0 0 2550 3300" role="img" aria-labelledby="title desc">
  <title id="title">Moon Phases</title>
  <desc id="desc">The changing shapes we see as the Moon reflects sunlight</desc>
  <defs>
    <linearGradient id="paperBg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f9fffe"/><stop offset=".52" stop-color="#ffffff"/><stop offset="1" stop-color="#f3e8ff"/></linearGradient>
    <linearGradient id="topWash" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#ff6b6b" stop-opacity=".22"/><stop offset=".50" stop-color="#4ecdc4" stop-opacity=".18"/><stop offset="1" stop-color="#5a3490" stop-opacity=".20"/></linearGradient>
    <filter id="softShadow" x="-15%" y="-15%" width="130%" height="130%"><feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#3b1f6b" flood-opacity=".14"/></filter>
    <filter id="tinyShadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#3b1f6b" flood-opacity=".12"/></filter>
    <marker id="arrow" markerWidth="18" markerHeight="18" refX="14" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L14,6 L2,10 Z" fill="#3B1F6B"/></marker>
    <marker id="arrowTeal" markerWidth="18" markerHeight="18" refX="14" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L14,6 L2,10 Z" fill="#35B8AF"/></marker>
    <style>
      .display{font-family:Georgia,'Times New Roman',serif} .sans{font-family:Arial,Helvetica,sans-serif} .navy{fill:#3B1F6B} .muted{fill:#5A7A78} .white{fill:#fff} .label{font-family:Arial,Helvetica,sans-serif;font-weight:900;letter-spacing:.03em} .small{font-size:32px} .body{font-size:42px} .caption{font-size:30px;font-weight:700} .titleText{font-size:96px;font-weight:900} .cardTitle{font-size:48px;font-weight:900} .tiny{font-size:26px}
    </style>
  </defs>
  <rect width="2550" height="3300" fill="url(#paperBg)"/>
  <rect width="2550" height="470" fill="url(#topWash)"/>
  <circle cx="230" cy="210" r="120" fill="#d4f5f3" opacity=".72"/><circle cx="2315" cy="270" r="145" fill="#ffe8e8" opacity=".72"/><circle cx="2105" cy="135" r="64" fill="#fef3c7" opacity=".75"/>
  <text x="1275" y="178" text-anchor="middle" class="display titleText navy">Moon Phases</text>
  <text x="1275" y="256" text-anchor="middle" class="sans body muted">The changing shapes we see as the Moon reflects sunlight</text>
  <text x="1275" y="322" text-anchor="middle" class="sans small muted">Little Lab Coats free printable · personal/family/classroom use</text>
<g transform="translate(160,475)" filter="url(#softShadow)"><rect width="2230" height="2520" rx="58" fill="#fff" stroke="#c8f0ed" stroke-width="5"/></g><circle cx="1275" cy="1670" r="190" fill="#60a5fa" stroke="#1d4ed8" stroke-width="9"/><text x="1275" y="1688" text-anchor="middle" class="sans" font-size="60" font-weight="900" fill="#fff">Earth</text><circle cx="2205" cy="960" r="145" fill="#fbbf24"/><text x="2205" y="1160" text-anchor="middle" class="sans caption" fill="#3B1F6B">Sunlight</text><path d="M2075 1230 C1850 1360 1600 1485 1420 1580" fill="none" stroke="#f59e0b" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/><circle cx="1275" cy="770" r="118" fill="#1e1b4b" stroke="#3B1F6B" stroke-width="6"/><text x="1275" y="942" text-anchor="middle" class="sans caption" fill="#3B1F6B">New Moon</text><clipPath id="clip17859501"><circle cx="1785" cy="950" r="118"/></clipPath><circle cx="1785" cy="950" r="118" fill="#1e1b4b" stroke="#3B1F6B" stroke-width="6"/><circle cx="1853.44" cy="950" r="118" fill="#fef3c7" clip-path="url(#clip17859501)"/><circle cx="1818.04" cy="950" r="118" fill="#1e1b4b" clip-path="url(#clip17859501)"/><circle cx="1785" cy="950" r="118" fill="none" stroke="#3B1F6B" stroke-width="6"/><text x="1785" y="1122" text-anchor="middle" class="sans caption" fill="#3B1F6B">Waxing</text><text x="1785" y="1160" text-anchor="middle" class="sans caption" fill="#3B1F6B">Crescent</text><clipPath id="clip198015152"><circle cx="1980" cy="1515" r="118"/></clipPath><circle cx="1980" cy="1515" r="118" fill="#1e1b4b" stroke="#3B1F6B" stroke-width="6"/><rect x="1980" y="1397" width="118" height="236" fill="#fef3c7" clip-path="url(#clip198015152)"/><circle cx="1980" cy="1515" r="118" fill="none" stroke="#3B1F6B" stroke-width="6"/><text x="1980" y="1687" text-anchor="middle" class="sans caption" fill="#3B1F6B">First Quarter</text><clipPath id="clip178520903"><circle cx="1785" cy="2090" r="118"/></clipPath><circle cx="1785" cy="2090" r="118" fill="#1e1b4b" stroke="#3B1F6B" stroke-width="6"/><circle cx="1820.4" cy="2090" r="118" fill="#fef3c7" clip-path="url(#clip178520903)"/><rect x="1785" y="1972" width="118" height="236" fill="#fef3c7" clip-path="url(#clip178520903)"/><circle cx="1785" cy="2090" r="118" fill="none" stroke="#3B1F6B" stroke-width="6"/><text x="1785" y="2262" text-anchor="middle" class="sans caption" fill="#3B1F6B">Waxing Gibbous</text><circle cx="1275" cy="2305" r="118" fill="#fef3c7" stroke="#3B1F6B" stroke-width="6"/><text x="1275" y="2477" text-anchor="middle" class="sans caption" fill="#3B1F6B">Full Moon</text><clipPath id="clip76520905"><circle cx="765" cy="2090" r="118"/></clipPath><circle cx="765" cy="2090" r="118" fill="#1e1b4b" stroke="#3B1F6B" stroke-width="6"/><circle cx="729.6" cy="2090" r="118" fill="#fef3c7" clip-path="url(#clip76520905)"/><rect x="647" y="1972" width="118" height="236" fill="#fef3c7" clip-path="url(#clip76520905)"/><circle cx="765" cy="2090" r="118" fill="none" stroke="#3B1F6B" stroke-width="6"/><text x="765" y="2262" text-anchor="middle" class="sans caption" fill="#3B1F6B">Waning Gibbous</text><clipPath id="clip57015156"><circle cx="570" cy="1515" r="118"/></clipPath><circle cx="570" cy="1515" r="118" fill="#1e1b4b" stroke="#3B1F6B" stroke-width="6"/><rect x="452" y="1397" width="118" height="236" fill="#fef3c7" clip-path="url(#clip57015156)"/><circle cx="570" cy="1515" r="118" fill="none" stroke="#3B1F6B" stroke-width="6"/><text x="570" y="1687" text-anchor="middle" class="sans caption" fill="#3B1F6B">Third Quarter</text><clipPath id="clip7659507"><circle cx="765" cy="950" r="118"/></clipPath><circle cx="765" cy="950" r="118" fill="#1e1b4b" stroke="#3B1F6B" stroke-width="6"/><circle cx="696.56" cy="950" r="118" fill="#fef3c7" clip-path="url(#clip7659507)"/><circle cx="731.96" cy="950" r="118" fill="#1e1b4b" clip-path="url(#clip7659507)"/><circle cx="765" cy="950" r="118" fill="none" stroke="#3B1F6B" stroke-width="6"/><text x="765" y="1122" text-anchor="middle" class="sans caption" fill="#3B1F6B">Waning</text><text x="765" y="1160" text-anchor="middle" class="sans caption" fill="#3B1F6B">Crescent</text><g transform="translate(305,2575)"><rect width="1940" height="270" rx="34" fill="#fbf7ff" stroke="#dac7ff" stroke-width="4" filter="url(#tinyShadow)"/><text x="42" y="68" class="sans cardTitle" fill="#3B1F6B">Why phases happen</text><text x="42" y="126" class="sans body muted">The Moon does not make its own light. We see the sunlit half from different angles</text><text x="42" y="184" class="sans body muted">as the Moon orbits Earth. A full cycle takes about 29.5 days.</text></g>  <g transform="translate(160,3070)">
    <rect x="0" y="0" width="2230" height="115" rx="36" fill="#ffffff" stroke="#C8F0ED" stroke-width="4"/>
    <text x="56" y="72" class="sans small muted">Little Lab Coats · Free science resource · Print in color when possible</text>
    <text x="2175" y="72" text-anchor="end" class="display" font-size="42" font-weight="900" fill="#3B1F6B">littlelabcoats.co</text>
  </g>
</svg>

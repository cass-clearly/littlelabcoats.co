<svg xmlns="http://www.w3.org/2000/svg" width="2550" height="3300" viewBox="0 0 2550 3300" role="img" aria-labelledby="title desc">
  <title id="title">Food Chain Visuals</title>
  <desc id="desc">Arrows show energy moving from food to eater</desc>

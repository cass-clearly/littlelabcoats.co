y muted">consumer</text></g><path d="M1375 790 L1445 790" fill="none" stroke="#3B1F6B" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/><g transform="translate(1465,680)"><rect width="285" height="220" rx="38" fill="#fbf7ff" stroke="#C8F0ED" stroke-width="4" filter="url(#tinyShadow)"/><circle cx="142" cy="68" r="38" fill="#fff"/><text x="142" y="83" text-anchor="middle" class="sans" font-size="38" font-weight="900" fill="#3B1F6B">4</text><text x="142" y="140" text-anchor="middle" class="sans caption" fill="#3B1F6B">frog</text><text x="142" y="198" text-anchor="middle" class="sans tiny muted">consumer</text></g><path d="M1760 790 L1830 790" fill="none" stroke="#3B1F6B" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/><g transform="translate(1850,680)"><rect width="285" height="220" rx="38" fill="#FEF3C7" stroke="#C8F0ED" stroke-width="4" filter="url(#tinyShadow)"/><circle cx="142" cy="68" r="38" fill="#fff"/><text x="142" y="83" text-anchor="middle" class="sans" font-size="38" font-weight="900" fill="#3B1F6B">5</text><text x="142" y="140" text-anchor="middle" class="sans caption" fill="#3B1F6B">snake</text><text x="142" y="198" text-anchor="middle" class="sans tiny muted">consumer</text></g><path d="M2145 790 L2215 790" fill="none" stroke="#3B1F6B" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/><g transform="translate(2235,680)"><rect width="285" height="220" rx="38" fill="#D4F5F3" stroke="#C8F0ED" stroke-width="4" filter="url(#tinyShadow)"/><circle cx="142" cy="68" r="38" fill="#fff"/><text x="142" y="83" text-anchor="middle" class="sans" font-size="38" font-weight="900" fill="#3B1F6B">6</text><text x="142" y="140" text-anchor="middle" class="sans caption" fill="#3B1F6B">hawk</text><text x="142" y="198" text-anchor="middle" class="sans tiny muted">consumer</text></g><text x="1275" y="1660" text-anchor="middle" class="display" font-size="64" font-weight="900" fill="#3B1F6B">Ocean example</text><g transform="translate(310,1750)"><rect width="285" height="220" rx="38" fill="#FEF3C7" stroke="#C8F0ED" stroke-width="4" filter="url(#tinyShadow)"/><circle cx="142" cy="68" r="38" fill="#fff"/><text x="142" y="83" text-anchor="middle" class="sans" font-size="38" font-weight="900" fill="#3B1F6B">1</text><text x="142" y="140" text-anchor="middle" class="sans caption" fill="#3B1F6B">Sun</text><text x="142" y="198" text-anchor="middle" class="sans tiny muted">energy</text></g><path d="M605 1860 L675 1860" fill="none" stroke="#3B1F6B" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/><g transform="translate(695,1750)"><rect width="285" height="220" rx="38" fill="#D4F5F3" stroke="#C8F0ED" stroke-width="4" filter="url(#tinyShadow)"/><circle cx="142" cy="68" r="38" fill="#fff"/><text x="142" y="83" text-anchor="middle" class="sans" font-size="38" font-weight="900" fill="#3B1F6B">2</text><text x="142" y="140" text-anchor="middle" class="sans caption" fill="#3B1F6B">phytoplankton</text><text x="142" y="198" text-anchor="middle" class="sans tiny muted">producer</text></g><path d="M990 1860 L1060 1860" fill="none" stroke="#3B1F6B" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/><g transform="translate(1080,1750)"><rect width="285" height="220" rx="38" fill="#FFE8E8" stroke="#C8F0ED" stroke-width="4" filter="url(#tinyShadow)"/><circle cx="142" cy="68" r="38" fill="#fff"/><text x="142" y="83" text-anchor="middle" class="sans" font-size="38" font-weight="900" fill="#3B1F6B">3</text><text x="142" y="140" text-anchor="middle" class="sans caption" fill="#3B1F6B">zooplankton</text><text x="142" y="198" text-anchor="middle" class="sans tiny muted">consumer</text></g><path d="M1375 1860 L1445 1860" fill="none" stroke="#3B1F6B" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/><g transform="translate(1465,1750)"><rect width="285" height="220" rx="38" fill="#fbf7ff" stroke="#C8F0ED" stroke-width="4" filter="url(#tinyShadow)"/><circle cx="142" cy="68" r="38" fill="#fff"/><text x="142" y="83" text-anchor="middle" class="sans" font-size="38" font-weight="900" fill="#3B1F6B">4</text><text x="142" y="140" text-anchor="middle" class="sans caption" fill="#3B1F6B">small fish</text><text x="142" y="198" text-anchor="middle" class="sans tiny muted">consumer</text></g><path d="M1760 1860 L1830 1860" fill="none" stroke="#3B1F6B" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/><g transform="translate(1850,1750)"><rect width="285" height="220" rx="38" fill="#FEF3C7" stroke="#C8F0ED" stroke-width="4" filter="url(#tinyShadow)"/><circle cx="142" cy="68" r="38" fill="#fff"/><text x="142" y="83" text-anchor="middle" class="sans" font-size="38" font-weight="900" fill="#3B1F6B">5</text><text x="142" y="140" text-anchor="middle" class="sans caption" fill="#3B1F6B">seal</text><text x="142" y="198" text-anchor="middle" class="sans tiny muted">consumer</text></g><path d="M2145 1860 L2215 1860" fill="none" stroke="#3B1F6B" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/><g transform="translate(2235,1750)"><rect width="285" height="220" rx="38" fill="#D4F5F3" stroke="#C8F0ED" stroke-width="4" filter="url(#tinyShadow)"/><circle cx="142" cy="68" r="38" fill="#fff"/><text x="142" y="83" text-anchor="middle" class="sans" font-size="38" font-weight="900" fill="#3B1F6B">6</text><text x="142" y="140" text-anchor="middle" class="sans caption" fill="#3B1F6B">orca</text><text x="142" y="198" text-anchor="middle" class="sans tiny muted">consumer</text></g><g transform="translate(375,2490)"><rect width="780" height="320" rx="34" fill="#ecfccb" stroke="#bbf7d0" stroke-width="4" filter="url(#tinyShadow)"/><text x="42" y="68" class="sans cardTitle" fill="#3B1F6B">Decomposers</text><text x="42" y="126" class="sans caption muted">Fungi, bacteria, and worms</text><text x="42" y="174" class="sans caption muted">break down dead plants</text><text x="42" y="222" class="sans caption muted">and animals. Nutrients</text><text x="42" y="270" class="sans caption muted">return to soil and water.</text></g><g transform="translate(1395,2490)"><rect width="780" height="320" rx="34" fill="#fff" stroke="#C8F0ED" stroke-width="4" filter="url(#tinyShadow)"/><text x="42" y="68" class="sans cardTitle" fill="#3B1F6B">Food web reminder</text><text x="42" y="126" class="sans body muted">A food chain is a simple model.</text><text x="42" y="184" class="sans body muted">Real ecosystems have many</text><text x="42" y="242" class="sans body muted">connected chains.</text></g>  <g transform="translate(160,3070)">

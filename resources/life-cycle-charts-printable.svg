und" marker-end="url(#arrow)"/><path d="M-80 420 C-175 385 -215 340 -225 275" fill="none" stroke="#3B1F6B" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/><path d="M-170 170 C-112 70 -72 42 -20 25" fill="none" stroke="#3B1F6B" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/></g><g transform="translate(840,1810)"><rect x="-320" y="-160" width="640" height="760" rx="42" fill="#FEF3C7" stroke="#C8F0ED" stroke-width="4" filter="url(#tinyShadow)"/><text x="0" y="-75" text-anchor="middle" class="display" font-size="56" font-weight="900" fill="#3B1F6B">Flowering plant</text><circle cx="0" cy="40" r="88" fill="#fff" stroke="#35B8AF" stroke-width="6"/><text x="0" y="58" text-anchor="middle" class="sans" font-size="62" font-weight="900" fill="#35B8AF">S</text><text x="0" y="172" text-anchor="middle" class="sans tiny" fill="#3B1F6B">seed</text><circle cx="205" cy="245" r="88" fill="#fff" stroke="#35B8AF" stroke-width="6"/><text x="205" y="263" text-anchor="middle" class="sans" font-size="62" font-weight="900" fill="#35B8AF">S</text><text x="205" y="377" text-anchor="middle" class="sans tiny" fill="#3B1F6B">seedling</text><circle cx="0" cy="450" r="88" fill="#fff" stroke="#35B8AF" stroke-width="6"/><text x="0" y="468" text-anchor="middle" class="sans" font-size="62" font-weight="900" fill="#35B8AF">F</text><text x="0" y="582" text-anchor="middle" class="sans tiny" fill="#3B1F6B">flower</text><circle cx="-205" cy="245" r="88" fill="#fff" stroke="#35B8AF" stroke-width="6"/><text x="-205" y="263" text-anchor="middle" class="sans" font-size="62" font-weight="900" fill="#35B8AF">F</text><text x="-205" y="377" text-anchor="middle" class="sans tiny" fill="#3B1F6B">fruit + seeds</text><path d="M80 80 C175 105 215 145 225 210" fill="none" stroke="#3B1F6B" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/><path d="M170 325 C110 420 75 450 25 470" fill="none" stroke="#3B1F6B" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/><path d="M-80 420 C-175 385 -215 340 -225 275" fill="none" stroke="#3B1F6B" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/><path d="M-170 170 C-112 70 -72 42 -20 25" fill="none" stroke="#3B1F6B" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/></g><g transform="translate(1515,1850)"><rect width="620" height="620" rx="34" fill="#fff" stroke="#C8F0ED" stroke-width="4" filter="url(#tinyShadow)"/><text x="42" y="68" class="sans cardTitle" fill="#3B1F6B">Life cycle</text><text x="42" y="126" class="sans body muted">A series of stages in a living thing’s life.</text><text x="42" y="184" class="sans body muted">Adults make offspring, and the pattern can repeat.</text></g><g transform="translate(305,2655)"><rect width="1940" height="220" rx="34" fill="#fff" stroke="#C8F0ED" stroke-width="4" filter="url(#tinyShadow)"/><text x="42" y="68" class="sans cardTitle" fill="#3B1F6B">Observe locally</text><text x="42" y="126" class="sans body muted">Compare the chart with real examples: butterflies in a garden,</text><text x="42" y="184" class="sans body muted">frogs near a pond, or beans sprouting in a jar.</text></g>  <g transform="translate(160,3070)">

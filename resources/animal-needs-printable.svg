<svg xmlns="http://www.w3.org/2000/svg" width="2550" height="3300" viewBox="0 0 2550 3300" role="img" aria-labelledby="title desc">
  <title id="title">What Animals Need</title>
  <desc id="desc">Basic needs animals get from their habitats</desc>
  <defs>
    <linearGradient id="paperBg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f9fffe"/><stop offset=".52" stop-color="#ffffff"/><stop offset="1" stop-color="#f3e8ff"/></linearGradient>
    <linearGradient id="topWash" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#ff6b6b" stop-opacity=".22"/><stop offset=".50" stop-color="#4ecdc4" stop-opacity=".18"/><stop offset="1" stop-color="#5a3490" stop-opacity=".20"/></linearGradient>
    <filter id="softShadow" x="-15%" y="-15%" width="130%" height="130%"><feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#3b1f6b" flood-opacity=".14"/></filter>
    <filter id="tinyShadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#3b1f6b" flood-opacity=".12"/></filter>
    <marker id="arrow" markerWidth="18" markerHeight="18" refX="14" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L14,6 L2,10 Z" fill="#3B1F6B"/></marker>
    <marker id="arrowTeal" markerWidth="18" markerHeight="18" refX="14" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L14,6 L2,10 Z" fill="#35B8AF"/></marker>
    <style>
      .display{font-family:Georgia,'Times New Roman',serif} .sans{font-family:Arial,Helvetica,sans-serif} .navy{fill:#3B1F6B} .muted{fill:#5A7A78} .white{fill:#fff} .label{font-family:Arial,Helvetica,sans-serif;font-weight:900;letter-spacing:.03em} .small{font-size:32px} .body{font-size:42px} .caption{font-size:30px;font-weight:700} .titleText{font-size:96px;font-weight:900} .cardTitle{font-size:48px;font-weight:900} .tiny{font-size:26px}
    </style>
  </defs>
  <rect width="2550" height="3300" fill="url(#paperBg)"/>
  <rect width="2550" height="470" fill="url(#topWash)"/>
  <circle cx="230" cy="210" r="120" fill="#d4f5f3" opacity=".72"/><circle cx="2315" cy="270" r="145" fill="#ffe8e8" opacity=".72"/><circle cx="2105" cy="135" r="64" fill="#fef3c7" opacity=".75"/>
  <text x="1275" y="178" text-anchor="middle" class="display titleText navy">What Animals Need</text>
  <text x="1275" y="256" text-anchor="middle" class="sans body muted">Basic needs animals get from their habitats</text>
  <text x="1275" y="322" text-anchor="middle" class="sans small muted">Little Lab Coats free printable · personal/family/classroom use</text>
<g transform="translate(160,475)" filter="url(#softShadow)"><rect width="2230" height="2520" rx="58" fill="#fff" stroke="#c8f0ed" stroke-width="5"/></g><g transform="translate(1040,765)"><rect width="470" height="370" rx="44" fill="#D4F5F3" stroke="#C8F0ED" stroke-width="4" filter="url(#tinyShadow)"/><circle cx="235" cy="92" r="58" fill="#fff"/><text x="235" y="115" text-anchor="middle" class="sans" font-size="58" font-weight="900" fill="#3B1F6B">🍎</text><text x="235" y="195" text-anchor="middle" class="sans cardTitle" fill="#3B1F6B">Food</text><text x="235" y="252" text-anchor="middle" class="sans tiny muted">energy to grow and</text><text x="235" y="292" text-anchor="middle" class="sans tiny muted">move</text></g><path d="M1275 1135 C1275 1290 1275 1290 1275 1630" fill="none" stroke="#35B8AF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowTeal)"/><g transform="translate(1629,1105)"><rect width="470" height="370" rx="44" fill="#FFE8E8" stroke="#C8F0ED" stroke-width="4" filter="url(#tinyShadow)"/><circle cx="235" cy="92" r="58" fill="#fff"/><text x="235" y="115" text-anchor="middle" class="sans" font-size="58" font-weight="900" fill="#3B1F6B">💧</text><text x="235" y="195" text-anchor="middle" class="sans cardTitle" fill="#3B1F6B">Water</text><text x="235" y="252" text-anchor="middle" class="sans tiny muted">for body systems</text></g><path d="M1864 1475 C1569 1460 1569 1460 1275 1630" fill="none" stroke="#35B8AF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowTeal)"/><g transform="translate(1629,1785)"><rect width="470" height="370" rx="44" fill="#FEF3C7" stroke="#C8F0ED" stroke-width="4" filter="url(#tinyShadow)"/><circle cx="235" cy="92" r="58" fill="#fff"/><text x="235" y="115" text-anchor="middle" class="sans" font-size="58" font-weight="900" fill="#3B1F6B">☁</text><text x="235" y="195" text-anchor="middle" class="sans cardTitle" fill="#3B1F6B">Air</text><text x="235" y="252" text-anchor="middle" class="sans tiny muted">oxygen for most</text><text x="235" y="292" text-anchor="middle" class="sans tiny muted">animals</text></g><path d="M1864 2155 C1569 1800 1569 1800 1275 1630" fill="none" stroke="#35B8AF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowTeal)"/><g transform="translate(1040,2125)"><rect width="470" height="370" rx="44" fill="#fbf7ff" stroke="#C8F0ED" stroke-width="4" filter="url(#tinyShadow)"/><circle cx="235" cy="92" r="58" fill="#fff"/><text x="235" y="115" text-anchor="middle" class="sans" font-size="58" font-weight="900" fill="#3B1F6B">⌂</text><text x="235" y="195" text-anchor="middle" class="sans cardTitle" fill="#3B1F6B">Shelter</text><text x="235" y="252" text-anchor="middle" class="sans tiny muted">a safe place to rest</text></g><path d="M1275 2495 C1275 1970 1275 1970 1275 1630" fill="none" stroke="#35B8AF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowTeal)"/><g transform="translate(451,1785)"><rect width="470" height="370" rx="44" fill="#D4F5F3" stroke="#C8F0ED" stroke-width="4" filter="url(#tinyShadow)"/><circle cx="235" cy="92" r="58" fill="#fff"/><text x="235" y="115" text-anchor="middle" class="sans" font-size="58" font-weight="900" fill="#3B1F6B">↔</text><text x="235" y="195" text-anchor="middle" class="sans cardTitle" fill="#3B1F6B">Space</text><text x="235" y="252" text-anchor="middle" class="sans tiny muted">room to move and find</text><text x="235" y="292" text-anchor="middle" class="sans tiny muted">resources</text></g><path d="M686 2155 C981 1800 981 1800 1275 1630" fill="none" stroke="#35B8AF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowTeal)"/><g transform="translate(451,1105)"><rect width="470" height="370" rx="44" fill="#FFE8E8" stroke="#C8F0ED" stroke-width="4" filter="url(#tinyShadow)"/><circle cx="235" cy="92" r="58" fill="#fff"/><text x="235" y="115" text-anchor="middle" class="sans" font-size="58" font-weight="900" fill="#3B1F6B">✓</text><text x="235" y="195" text-anchor="middle" class="sans cardTitle" fill="#3B1F6B">Safety</text><text x="235" y="252" text-anchor="middle" class="sans tiny muted">protection from danger</text></g><path d="M686 1475 C981 1460 981 1460 1275 1630" fill="none" stroke="#35B8AF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowTeal)"/><g transform="translate(965,1320)"><circle cx="310" cy="250" r="190" fill="#a7f3d0" stroke="#047857" stroke-width="8"/><ellipse cx="260" cy="240" rx="105" ry="72" fill="#f59e0b"/><circle cx="365" cy="218" r="54" fill="#f59e0b"/><circle cx="385" cy="205" r="7" fill="#111827"/><path d="M172 240 L65 182 L80 302 Z" fill="#f59e0b"/><text x="310" y="505" text-anchor="middle" class="display" font-size="64" font-weight="900" fill="#3B1F6B">Habitat</text><text x="310" y="565" text-anchor="middle" class="sans caption muted">where needs are met</text></g><g transform="translate(365,2650)"><rect width="1820" height="220" rx="34" fill="#fff" stroke="#C8F0ED" stroke-width="4" filter="url(#tinyShadow)"/><text x="42" y="68" class="sans cardTitle" fill="#3B1F6B">Think like a naturalist</text><text x="42" y="126" class="sans body muted">Choose an animal. How does its habitat provide food, water, air, shelter, space, and safety?</text><text x="42" y="184" class="sans body muted">What would happen if one need disappeared?</text></g>  <g transform="translate(160,3070)">
    <rect x="0" y="0" width="2230" height="115" rx="36" fill="#ffffff" stroke="#C8F0ED" stroke-width="4"/>
    <text x="56" y="72" class="sans small muted">Little Lab Coats · Free science resource · Print in color when possible</text>
    <text x="2175" y="72" text-anchor="end" class="display" font-size="42" font-weight="900" fill="#3B1F6B">littlelabcoats.co</text>
  </g>
</svg>

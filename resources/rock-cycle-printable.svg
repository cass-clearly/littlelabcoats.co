<svg xmlns="http://www.w3.org/2000/svg" width="2550" height="3300" viewBox="0 0 2550 3300" role="img" aria-labelledby="title desc">
  <title id="title">The Rock Cycle</title>
  <desc id="desc">How rocks change through heat, pressure, melting, cooling, and erosion</desc>
  <defs>
    <linearGradient id="paperBg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f9fffe"/><stop offset=".52" stop-color="#ffffff"/><stop offset="1" stop-color="#f3e8ff"/></linearGradient>
    <linearGradient id="topWash" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#ff6b6b" stop-opacity=".22"/><stop offset=".50" stop-color="#4ecdc4" stop-opacity=".18"/><stop offset="1" stop-color="#5a3490" stop-opacity=".20"/></linearGradient>
    <filter id="softShadow" x="-15%" y="-15%" width="130%" height="130%"><feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#3b1f6b" flood-opacity=".14"/></filter>
    <filter id="tinyShadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#3b1f6b" flood-opacity=".12"/></filter>
    <marker id="arrow" markerWidth="18" markerHeight="18" refX="14" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L14,6 L2,10 Z" fill="#3B1F6B"/></marker>
    <marker id="arrowTeal" markerWidth="18" markerHeight="18" refX="14" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L14,6 L2,10 Z" fill="#35B8AF"/></marker>
    <style>
      .display{font-family:Georgia,'Times New Roman',serif} .sans{font-family:Arial,Helvetica,sans-serif} .navy{fill:#3B1F6B} .muted{fill:#5A7A78} .white{fill:#fff} .label{font-family:Arial,Helvetica,sans-serif;font-weight:900;letter-spacing:.03em} .small{font-size:32px} .body{font-size:42px} .caption{font-size:30px;font-weight:700} .titleText{font-size:96px;font-weight:900} .cardTitle{font-size:48px;font-weight:900} .tiny{font-size:26px}
    </style>
  </defs>
  <rect width="2550" height="3300" fill="url(#paperBg)"/>
  <rect width="2550" height="470" fill="url(#topWash)"/>
  <circle cx="230" cy="210" r="120" fill="#d4f5f3" opacity=".72"/><circle cx="2315" cy="270" r="145" fill="#ffe8e8" opacity=".72"/><circle cx="2105" cy="135" r="64" fill="#fef3c7" opacity=".75"/>
  <text x="1275" y="178" text-anchor="middle" class="display titleText navy">The Rock Cycle</text>
  <text x="1275" y="256" text-anchor="middle" class="sans body muted">How rocks change through heat, pressure, melting, cooling, and erosion</text>
  <text x="1275" y="322" text-anchor="middle" class="sans small muted">Little Lab Coats free printable · personal/family/classroom use</text>
<g transform="translate(160,475)" filter="url(#softShadow)"><rect width="2230" height="2520" rx="58" fill="#fff" stroke="#c8f0ed" stroke-width="5"/></g><g transform="translate(1015,665)"><rect width="520" height="230" rx="42" fill="#ffedd5" stroke="#ea580c" stroke-width="6" filter="url(#tinyShadow)"/><text x="260" y="90" text-anchor="middle" class="sans" font-size="46" font-weight="900" fill="#3B1F6B">Magma</text><path d="M225 160 C245 115 295 105 305 160 C305 195 225 205 225 160Z" fill="#fb923c"/><path d="M270 163 C285 128 323 125 330 166 C330 195 270 198 270 163Z" fill="#ef4444"/></g><g transform="translate(1710,1125)"><rect width="520" height="230" rx="42" fill="#fee2e2" stroke="#b91c1c" stroke-width="6" filter="url(#tinyShadow)"/><text x="260" y="90" text-anchor="middle" class="sans" font-size="46" font-weight="900" fill="#3B1F6B">Igneous rock</text><path d="M185 153 L245 125 L335 145 L365 190 L210 196 Z" fill="#b91c1c" opacity=".72"/><path d="M230 150 L285 138 L322 180 L208 184 Z" fill="#fff" opacity=".25"/></g><g transform="translate(1465,2030)"><rect width="520" height="230" rx="42" fill="#fef3c7" stroke="#b45309" stroke-width="6" filter="url(#tinyShadow)"/><text x="260" y="90" text-anchor="middle" class="sans" font-size="46" font-weight="900" fill="#3B1F6B">Sediment</text><path d="M185 153 L245 125 L335 145 L365 190 L210 196 Z" fill="#b45309" opacity=".72"/><path d="M230 150 L285 138 L322 180 L208 184 Z" fill="#fff" opacity=".25"/></g><g transform="translate(565,2030)"><rect width="520" height="230" rx="42" fill="#ecfccb" stroke="#4d7c0f" stroke-width="6" filter="url(#tinyShadow)"/><text x="260" y="90" text-anchor="middle" class="sans" font-size="46" font-weight="900" fill="#3B1F6B">Sedimentary rock</text><path d="M185 153 L245 125 L335 145 L365 190 L210 196 Z" fill="#4d7c0f" opacity=".72"/><path d="M230 150 L285 138 L322 180 L208 184 Z" fill="#fff" opacity=".25"/></g><g transform="translate(320,1125)"><rect width="520" height="230" rx="42" fill="#ede9fe" stroke="#5b21b6" stroke-width="6" filter="url(#tinyShadow)"/><text x="260" y="90" text-anchor="middle" class="sans" font-size="46" font-weight="900" fill="#3B1F6B">Metamorphic rock</text><path d="M185 153 L245 125 L335 145 L365 190 L210 196 Z" fill="#5b21b6" opacity=".72"/><path d="M230 150 L285 138 L322 180 L208 184 Z" fill="#fff" opacity=".25"/></g><path d="M1460 890 C1740 935 1945 995 1995 1100" fill="none" stroke="#3B1F6B" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/><text x="1745" y="900" class="sans caption muted">cooling</text><path d="M1900 1390 C1885 1660 1815 1885 1712 2015" fill="none" stroke="#3B1F6B" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/><text x="1900" y="1740" class="sans caption muted">weathering + erosion</text><path d="M1490 2175 C1285 2250 1080 2250 930 2180" fill="none" stroke="#3B1F6B" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/><text x="1195" y="2328" text-anchor="middle" class="sans caption muted">compaction + cementation</text><path d="M710 2025 C575 1790 520 1565 560 1390" fill="none" stroke="#3B1F6B" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/><text x="360" y="1740" class="sans caption muted">heat + pressure</text><path d="M680 1080 C820 880 1010 780 1115 765" fill="none" stroke="#3B1F6B" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/><text x="780" y="905" class="sans caption muted">melting</text><path d="M1800 1190 C1420 1180 1030 1190 720 1220" fill="none" stroke="#35B8AF" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowTeal)"/><text x="1275" y="1132" text-anchor="middle" class="sans caption" fill="#35B8AF">heat + pressure can also change igneous rock</text><path d="M775 1975 C1010 1640 1320 1310 1840 1330" fill="none" stroke="#35B8AF" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowTeal)"/><text x="1160" y="1645" class="sans caption" fill="#35B8AF">melting can happen after deep burial</text><g transform="translate(245,2520)"><rect width="2060" height="315" rx="34" fill="#f9fffe" stroke="#C8F0ED" stroke-width="4" filter="url(#tinyShadow)"/><text x="42" y="68" class="sans cardTitle" fill="#3B1F6B">Family note</text><text x="42" y="126" class="sans body muted">Rocks do not all follow one perfect circle. Any rock can be weathered into sediment,</text><text x="42" y="184" class="sans body muted">buried and changed, melted into magma, or lifted back to the surface over long geologic time.</text></g>  <g transform="translate(160,3070)">
    <rect x="0" y="0" width="2230" height="115" rx="36" fill="#ffffff" stroke="#C8F0ED" stroke-width="4"/>
    <text x="56" y="72" class="sans small muted">Little Lab Coats · Free science resource · Print in color when possible</text>
    <text x="2175" y="72" text-anchor="end" class="display" font-size="42" font-weight="900" fill="#3B1F6B">littlelabcoats.co</text>
  </g>
</svg>

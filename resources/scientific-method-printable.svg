<svg xmlns="http://www.w3.org/2000/svg" width="2550" height="3300" viewBox="0 0 2550 3300" role="img" aria-labelledby="title desc">
  <title id="title">Scientific Method</title>
  <desc id="desc">A flexible path for curious family scientists</desc>
  <defs>
    <linearGradient id="paperBg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f9fffe"/><stop offset=".52" stop-color="#ffffff"/><stop offset="1" stop-color="#f3e8ff"/></linearGradient>
    <linearGradient id="topWash" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#ff6b6b" stop-opacity=".22"/><stop offset=".50" stop-color="#4ecdc4" stop-opacity=".18"/><stop offset="1" stop-color="#5a3490" stop-opacity=".20"/></linearGradient>
    <filter id="softShadow" x="-15%" y="-15%" width="130%" height="130%"><feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#3b1f6b" flood-opacity=".14"/></filter>
    <filter id="tinyShadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#3b1f6b" flood-opacity=".12"/></filter>
    <marker id="arrow" markerWidth="18" markerHeight="18" refX="14" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L14,6 L2,10 Z" fill="#3B1F6B"/></marker>
    <marker id="arrowTeal" markerWidth="18" markerHeight="18" refX="14" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L14,6 L2,10 Z" fill="#35B8AF"/></marker>
    <style>
      .display{font-family:Georgia,'Times New Roman',serif} .sans{font-family:Arial,Helvetica,sans-serif} .navy{fill:#3B1F6B} .muted{fill:#5A7A78} .white{fill:#fff} .label{font-family:Arial,Helvetica,sans-serif;font-weight:900;letter-spacing:.03em} .small{font-size:32px} .body{font-size:42px} .caption{font-size:30px;font-weight:700} .titleText{font-size:96px;font-weight:900} .cardTitle{font-size:48px;font-weight:900} .tiny{font-size:26px}
    </style>
  </defs>
  <rect width="2550" height="3300" fill="url(#paperBg)"/>
  <rect width="2550" height="470" fill="url(#topWash)"/>
  <circle cx="230" cy="210" r="120" fill="#d4f5f3" opacity=".72"/><circle cx="2315" cy="270" r="145" fill="#ffe8e8" opacity=".72"/><circle cx="2105" cy="135" r="64" fill="#fef3c7" opacity=".75"/>
  <text x="1275" y="178" text-anchor="middle" class="display titleText navy">Scientific Method</text>
  <text x="1275" y="256" text-anchor="middle" class="sans body muted">A flexible path for curious family scientists</text>
  <text x="1275" y="322" text-anchor="middle" class="sans small muted">Little Lab Coats free printable · personal/family/classroom use</text>
<g transform="translate(160,475)" filter="url(#softShadow)"><rect width="2230" height="2520" rx="58" fill="#fff" stroke="#c8f0ed" stroke-width="5"/></g><g transform="translate(360,680)"><rect width="800" height="300" rx="42" fill="#FFE8E8" stroke="#C8F0ED" stroke-width="4" filter="url(#tinyShadow)"/><circle cx="90" cy="90" r="54" fill="#3B1F6B"/><text x="90" y="110" text-anchor="middle" class="sans" font-size="54" font-weight="900" fill="#fff">1</text><text x="165" y="90" class="sans cardTitle" fill="#3B1F6B">Ask</text><text x="165" y="150" class="sans body muted">What do you wonder?</text></g><g transform="translate(1300,680)"><rect width="800" height="300" rx="42" fill="#D4F5F3" stroke="#C8F0ED" stroke-width="4" filter="url(#tinyShadow)"/><circle cx="90" cy="90" r="54" fill="#3B1F6B"/><text x="90" y="110" text-anchor="middle" class="sans" font-size="54" font-weight="900" fill="#fff">2</text><text x="165" y="90" class="sans cardTitle" fill="#3B1F6B">Predict</text><text x="165" y="150" class="sans body muted">What do you think will</text><text x="165" y="204" class="sans body muted">happen?</text></g><g transform="translate(360,1110)"><rect width="800" height="300" rx="42" fill="#FEF3C7" stroke="#C8F0ED" stroke-width="4" filter="url(#tinyShadow)"/><circle cx="90" cy="90" r="54" fill="#3B1F6B"/><text x="90" y="110" text-anchor="middle" class="sans" font-size="54" font-weight="900" fill="#fff">3</text><text x="165" y="90" class="sans cardTitle" fill="#3B1F6B">Plan</text><text x="165" y="150" class="sans body muted">What will you change,</text><text x="165" y="204" class="sans body muted">measure, and keep the same?</text></g><g transform="translate(1300,1110)"><rect width="800" height="300" rx="42" fill="#fbf7ff" stroke="#C8F0ED" stroke-width="4" filter="url(#tinyShadow)"/><circle cx="90" cy="90" r="54" fill="#3B1F6B"/><text x="90" y="110" text-anchor="middle" class="sans" font-size="54" font-weight="900" fill="#fff">4</text><text x="165" y="90" class="sans cardTitle" fill="#3B1F6B">Test</text><text x="165" y="150" class="sans body muted">Try it carefully and fairly.</text></g><g transform="translate(360,1540)"><rect width="800" height="300" rx="42" fill="#FFE8E8" stroke="#C8F0ED" stroke-width="4" filter="url(#tinyShadow)"/><circle cx="90" cy="90" r="54" fill="#3B1F6B"/><text x="90" y="110" text-anchor="middle" class="sans" font-size="54" font-weight="900" fill="#fff">5</text><text x="165" y="90" class="sans cardTitle" fill="#3B1F6B">Record</text><text x="165" y="150" class="sans body muted">Write or draw what you</text><text x="165" y="204" class="sans body muted">observe.</text></g><g transform="translate(1300,1540)"><rect width="800" height="300" rx="42" fill="#D4F5F3" stroke="#C8F0ED" stroke-width="4" filter="url(#tinyShadow)"/><circle cx="90" cy="90" r="54" fill="#3B1F6B"/><text x="90" y="110" text-anchor="middle" class="sans" font-size="54" font-weight="900" fill="#fff">6</text><text x="165" y="90" class="sans cardTitle" fill="#3B1F6B">Explain</text><text x="165" y="150" class="sans body muted">What does the evidence show?</text></g><g transform="translate(405,1970)"><rect width="1740" height="300" rx="42" fill="#FEF3C7" stroke="#C8F0ED" stroke-width="4" filter="url(#tinyShadow)"/><circle cx="90" cy="90" r="54" fill="#3B1F6B"/><text x="90" y="110" text-anchor="middle" class="sans" font-size="54" font-weight="900" fill="#fff">7</text><text x="165" y="90" class="sans cardTitle" fill="#3B1F6B">Share</text><text x="165" y="150" class="sans body muted">Tell what you learned and what you would</text><text x="165" y="204" class="sans body muted">try next.</text></g><g transform="translate(405,2535)"><rect width="1740" height="270" rx="34" fill="#fff" stroke="#C8F0ED" stroke-width="4" filter="url(#tinyShadow)"/><text x="42" y="68" class="sans cardTitle" fill="#3B1F6B">Important</text><text x="42" y="126" class="sans body muted">Scientists often loop back. A surprising result can lead to a better question,</text><text x="42" y="184" class="sans body muted">a new prediction, or an improved test. That is real science.</text></g>  <g transform="translate(160,3070)">
    <rect x="0" y="0" width="2230" height="115" rx="36" fill="#ffffff" stroke="#C8F0ED" stroke-width="4"/>
    <text x="56" y="72" class="sans small muted">Little Lab Coats · Free science resource · Print in color when possible</text>
    <text x="2175" y="72" text-anchor="end" class="display" font-size="42" font-weight="900" fill="#3B1F6B">littlelabcoats.co</text>
  </g>
</svg>

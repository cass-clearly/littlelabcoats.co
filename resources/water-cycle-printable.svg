    <linearGradient id="topWash" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#ff6b6b" stop-opacity=".22"/><stop offset=".50" stop-color="#4ecdc4" stop-opacity=".18"/><stop offset="1" stop-color="#5a3490" stop-opacity=".20"/></linearGradient>

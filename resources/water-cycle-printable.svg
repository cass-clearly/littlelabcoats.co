  <text x="1275" y="178" text-anchor="middle" class="display titleText navy">The Water Cycle</text>
  <text x="1275" y="256" text-anchor="middle" class="sans body muted">Water moves through air, land, plants, rivers, and oceans</text>
  <text x="1275" y="322" text-anchor="middle" class="sans small muted">Little Lab Coats free printable · personal/family/classroom use</text>
<g transform="translate(160,475)" filter="url(#softShadow)"><rect width="2230" height="2520" rx="58" fill="#fff" stroke="#c8f0ed" stroke-width="5"/></g><rect x="250" y="2140" width="2050" height="520" rx="55" fill="#d4f5f3"/><path d="M250 2140 C680 2020 1000 2055 1320 2140 C1620 2220 1900 2080 2300 2140 L2300 2660 L250 2660 Z" fill="#7dd3fc" opacity=".85"/><path d="M290 2140 L730 1180 L1120 2140 Z" fill="#9ca3af"/><path d="M730 1180 L610 1440 L850 1440 Z" fill="#f8fafc"/><path d="M830 2140 L1260 1420 L1650 2140 Z" fill="#94a3b8"/><path d="M1260 1420 L1130 1645 L1390 1645 Z" fill="#f8fafc"/><rect x="1760" y="1690" width="50" height="455" fill="#8b5a2b"/><circle cx="1785" cy="1630" r="145" fill="#34b875"/><circle cx="1695" cy="1700" r="95" fill="#22c55e"/><circle cx="1885" cy="1705" r="95" fill="#22c55e"/><circle cx="1975" cy="805" r="155" fill="#fbbf24"/><g stroke="#fbbf24" stroke-width="14" stroke-linecap="round"><line x1="1975" y1="560" x2="1975" y2="650"/><line x1="1975" y1="960" x2="1975" y2="1055"/><line x1="1730" y1="805" x2="1820" y2="805"/><line x1="2130" y1="805" x2="2225" y2="805"/><line x1="1800" y1="630" x2="1864" y2="694"/><line x1="2086" y1="916" x2="2152" y2="982"/></g><g transform="translate(740,720)"><ellipse cx="165" cy="105" rx="145" ry="70" fill="#e0f2fe" stroke="#38bdf8" stroke-width="5"/><circle cx="80" cy="85" r="70" fill="#e0f2fe"/><circle cx="165" cy="45" r="82" fill="#e0f2fe"/><circle cx="250" cy="80" r="70" fill="#e0f2fe"/></g><g transform="translate(1120,625)"><ellipse cx="165" cy="105" rx="145" ry="70" fill="#e0f2fe" stroke="#38bdf8" stroke-width="5"/><circle cx="80" cy="85" r="70" fill="#e0f2fe"/><circle cx="165" cy="45" r="82" fill="#e0f2fe"/><circle cx="250" cy="80" r="70" fill="#e0f2fe"/></g><path d="M1880 2050 C1720 1720 1710 1320 1840 980" fill="none" stroke="#35B8AF" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowTeal)"/><g transform="translate(1590,1360)"><rect width="264" height="58" rx="29" fill="#D4F5F3" stroke="#C8F0ED" stroke-width="3"/><text x="132.0" y="39" text-anchor="middle" class="sans caption" fill="#3B1F6B">evaporation</text></g><path d="M1690 1705 C1570 1390 1420 1150 1230 845" fill="none" stroke="#35B8AF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowTeal)"/><g transform="translate(1290,1530)"><rect width="312" height="58" rx="29" fill="#D4F5F3" stroke="#C8F0ED" stroke-width="3"/><text x="156.0" y="39" text-anchor="middle" class="sans caption" fill="#3B1F6B">transpiration</text></g><path d="M1385 760 C1560 675 1715 675 1885 760" fill="none" stroke="#3B1F6B" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/><g transform="translate(1395,575)"><rect width="288" height="58" rx="29" fill="#D4F5F3" stroke="#C8F0ED" stroke-width="3"/><text x="144.0" y="39" text-anchor="middle" class="sans caption" fill="#3B1F6B">condensation</text></g><g stroke="#38bdf8" stroke-width="10" stroke-linecap="round"><line x1="900" y1="940" x2="840" y2="1135"/><line x1="1025" y1="930" x2="960" y2="1165"/><line x1="1160" y1="920" x2="1105" y2="1145"/><line x1="1305" y1="905" x2="1245" y2="1135"/></g><g transform="translate(820,1210)"><rect width="312" height="58" rx="29" fill="#D4F5F3" stroke="#C8F0ED" stroke-width="3"/><text x="156.0" y="39" text-anchor="middle" class="sans caption" fill="#3B1F6B">precipitation</text></g><path d="M1070 2195 C1355 2290 1565 2305 1785 2235" fill="none" stroke="#3B1F6B" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/><g transform="translate(1250,2350)"><rect width="456" height="58" rx="29" fill="#D4F5F3" stroke="#C8F0ED" stroke-width="3"/><text x="228.0" y="39" text-anchor="middle" class="sans caption" fill="#3B1F6B">runoff + collection</text></g><path d="M645 2235 C600 2390 660 2475 820 2525" fill="none" stroke="#3B1F6B" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/><g transform="translate(475,2480)"><rect width="288" height="58" rx="29" fill="#D4F5F3" stroke="#C8F0ED" stroke-width="3"/><text x="144.0" y="39" text-anchor="middle" class="sans caption" fill="#3B1F6B">infiltration</text></g><g transform="translate(335,2675)"><rect width="1880" height="210" rx="34" fill="#fff" stroke="#C8F0ED" stroke-width="4" filter="url(#tinyShadow)"/><text x="42" y="68" class="sans cardTitle" fill="#3B1F6B">Big idea</text><text x="42" y="126" class="sans body muted">The Sun warms water. Water evaporates, forms clouds, falls as precipitation,</text><text x="42" y="184" class="sans body muted">and collects in oceans, rivers, lakes, soil, ice, and living things.</text></g>  <g transform="translate(160,3070)">

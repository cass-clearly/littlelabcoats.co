<svg xmlns="http://www.w3.org/2000/svg" width="2550" height="3300" viewBox="0 0 2550 3300" role="img" aria-labelledby="title desc">
  <title id="title">Atoms &amp; Molecules</title>
  <desc id="desc">Tiny building blocks, simple models, and familiar examples</desc>
  <defs>
    <linearGradient id="paperBg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f9fffe"/><stop offset=".52" stop-color="#ffffff"/><stop offset="1" stop-color="#f3e8ff"/></linearGradient>
    <linearGradient id="topWash" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#ff6b6b" stop-opacity=".22"/><stop offset=".50" stop-color="#4ecdc4" stop-opacity=".18"/><stop offset="1" stop-color="#5a3490" stop-opacity=".20"/></linearGradient>
    <filter id="softShadow" x="-15%" y="-15%" width="130%" height="130%"><feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#3b1f6b" flood-opacity=".14"/></filter>
    <filter id="tinyShadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#3b1f6b" flood-opacity=".12"/></filter>
    <marker id="arrow" markerWidth="18" markerHeight="18" refX="14" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L14,6 L2,10 Z" fill="#3B1F6B"/></marker>
    <marker id="arrowTeal" markerWidth="18" markerHeight="18" refX="14" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L14,6 L2,10 Z" fill="#35B8AF"/></marker>
    <style>
      .display{font-family:Georgia,'Times New Roman',serif} .sans{font-family:Arial,Helvetica,sans-serif} .navy{fill:#3B1F6B} .muted{fill:#5A7A78} .white{fill:#fff} .label{font-family:Arial,Helvetica,sans-serif;font-weight:900;letter-spacing:.03em} .small{font-size:32px} .body{font-size:42px} .caption{font-size:30px;font-weight:700} .titleText{font-size:96px;font-weight:900} .cardTitle{font-size:48px;font-weight:900} .tiny{font-size:26px}
    </style>
  </defs>
  <rect width="2550" height="3300" fill="url(#paperBg)"/>
  <rect width="2550" height="470" fill="url(#topWash)"/>
  <circle cx="230" cy="210" r="120" fill="#d4f5f3" opacity=".72"/><circle cx="2315" cy="270" r="145" fill="#ffe8e8" opacity=".72"/><circle cx="2105" cy="135" r="64" fill="#fef3c7" opacity=".75"/>
  <text x="1275" y="178" text-anchor="middle" class="display titleText navy">Atoms &amp; Molecules</text>
  <text x="1275" y="256" text-anchor="middle" class="sans body muted">Tiny building blocks, simple models, and familiar examples</text>
  <text x="1275" y="322" text-anchor="middle" class="sans small muted">Little Lab Coats free printable · personal/family/classroom use</text>
<g transform="translate(160,475)" filter="url(#softShadow)"><rect width="2230" height="2520" rx="58" fill="#fff" stroke="#c8f0ed" stroke-width="5"/></g><g transform="translate(395,790)"><text x="330" y="-95" text-anchor="middle" class="display" font-size="68" font-weight="900" fill="#3B1F6B">Atom model</text><ellipse cx="330" cy="330" rx="300" ry="115" fill="none" stroke="#35B8AF" stroke-width="10" opacity=".82" transform="rotate(0 330 330)"/><ellipse cx="330" cy="330" rx="300" ry="115" fill="none" stroke="#35B8AF" stroke-width="10" opacity=".82" transform="rotate(60 330 330)"/><ellipse cx="330" cy="330" rx="300" ry="115" fill="none" stroke="#35B8AF" stroke-width="10" opacity=".82" transform="rotate(120 330 330)"/><circle cx="330" cy="330" r="112" fill="#ffe8e8" stroke="#ff6b6b" stroke-width="7"/><circle cx="300" cy="305" r="32" fill="#FF6B6B"/><text x="300" y="317" text-anchor="middle" class="sans" font-size="42" font-weight="900" fill="#fff">+</text><circle cx="362" cy="302" r="32" fill="#5A3490"/><text x="362" y="314" text-anchor="middle" class="sans" font-size="42" font-weight="900" fill="#fff"></text><circle cx="325" cy="365" r="32" fill="#FF6B6B"/><text x="325" y="377" text-anchor="middle" class="sans" font-size="42" font-weight="900" fill="#fff">+</text><circle cx="382" cy="368" r="32" fill="#5A3490"/><text x="382" y="380" text-anchor="middle" class="sans" font-size="42" font-weight="900" fill="#fff"></text><circle cx="280" cy="360" r="32" fill="#5A3490"/><text x="280" y="372" text-anchor="middle" class="sans" font-size="42" font-weight="900" fill="#fff"></text><circle cx="88" cy="330" r="26" fill="#2CB9D5" stroke="#fff" stroke-width="6"/><circle cx="572" cy="330" r="26" fill="#2CB9D5" stroke="#fff" stroke-width="6"/><circle cx="330" cy="30" r="26" fill="#2CB9D5" stroke="#fff" stroke-width="6"/><circle cx="330" cy="630" r="26" fill="#2CB9D5" stroke="#fff" stroke-width="6"/><circle cx="104" cy="172" r="26" fill="#2CB9D5" stroke="#fff" stroke-width="6"/><circle cx="556" cy="488" r="26" fill="#2CB9D5" stroke="#fff" stroke-width="6"/><path d="M650 335 C760 335 800 335 885 335" fill="none" stroke="#3B1F6B" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/><text x="930" y="318" class="sans caption" fill="#3B1F6B">electron</text><text x="930" y="360" class="sans tiny muted">negative charge</text><path d="M455 455 C560 575 620 650 735 705" fill="none" stroke="#3B1F6B" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/><text x="780" y="708" class="sans caption" fill="#3B1F6B">nucleus</text><text x="780" y="750" class="sans tiny muted">protons + neutrons</text></g><g transform="translate(1450,755)"><text x="350" y="-60" text-anchor="middle" class="display" font-size="68" font-weight="900" fill="#3B1F6B">Molecule model</text><line x1="228" y1="302" x2="348" y2="230" stroke="#3B1F6B" stroke-width="16" stroke-linecap="round"/><line x1="472" y1="302" x2="352" y2="230" stroke="#3B1F6B" stroke-width="16" stroke-linecap="round"/><circle cx="350" cy="205" r="108" fill="#ff6b6b" stroke="#b91c1c" stroke-width="7"/><text x="350" y="226" text-anchor="middle" class="sans" font-size="74" font-weight="900" fill="#fff">O</text><circle cx="205" cy="325" r="78" fill="#4ECDC4" stroke="#35B8AF" stroke-width="7"/><text x="205" y="348" text-anchor="middle" class="sans" font-size="64" font-weight="900" fill="#fff">H</text><circle cx="495" cy="325" r="78" fill="#4ECDC4" stroke="#35B8AF" stroke-width="7"/><text x="495" y="348" text-anchor="middle" class="sans" font-size="64" font-weight="900" fill="#fff">H</text><text x="350" y="505" text-anchor="middle" class="sans" font-size="64" font-weight="900" fill="#3B1F6B">H₂O = water molecule</text><text x="350" y="570" text-anchor="middle" class="sans body muted">2 hydrogen atoms + 1 oxygen atom</text></g><g transform="translate(245,1780)"><rect width="640" height="510" rx="34" fill="#FFE8E8" stroke="#ffd1d1" stroke-width="4" filter="url(#tinyShadow)"/><text x="42" y="68" class="sans cardTitle" fill="#3B1F6B">Atom</text><text x="42" y="126" class="sans body muted">One tiny piece of matter.</text><text x="42" y="184" class="sans body muted">Examples: oxygen atom,</text><text x="42" y="242" class="sans body muted">carbon atom, hydrogen atom.</text></g><g transform="translate(955,1780)"><rect width="640" height="510" rx="34" fill="#D4F5F3" stroke="#C8F0ED" stroke-width="4" filter="url(#tinyShadow)"/><text x="42" y="68" class="sans cardTitle" fill="#3B1F6B">Molecule</text><text x="42" y="126" class="sans body muted">Two or more atoms</text><text x="42" y="184" class="sans body muted">bonded together.</text><text x="42" y="242" class="sans body muted">Examples: water, oxygen gas.</text></g><g transform="translate(1665,1780)"><rect width="640" height="510" rx="34" fill="#fbf7ff" stroke="#dac7ff" stroke-width="4" filter="url(#tinyShadow)"/><text x="42" y="68" class="sans cardTitle" fill="#3B1F6B">Chemical formula</text><text x="42" y="126" class="sans body muted">A shorthand recipe for</text><text x="42" y="184" class="sans body muted">which atoms are in a</text><text x="42" y="242" class="sans body muted">molecule: CO₂, O₂, H₂O.</text></g><g transform="translate(245,2375)"><rect width="2060" height="420" rx="34" fill="#fff" stroke="#C8F0ED" stroke-width="4" filter="url(#tinyShadow)"/><text x="42" y="68" class="sans cardTitle" fill="#3B1F6B">Remember</text><text x="42" y="126" class="sans body muted">Models help us think. Real atoms are mostly empty space,</text><text x="42" y="184" class="sans body muted">electrons do not move on neat tracks like planets, and atoms</text><text x="42" y="242" class="sans body muted">are much too small to see with our eyes.</text></g>  <g transform="translate(160,3070)">
    <rect x="0" y="0" width="2230" height="115" rx="36" fill="#ffffff" stroke="#C8F0ED" stroke-width="4"/>
    <text x="56" y="72" class="sans small muted">Little Lab Coats · Free science resource · Print in color when possible</text>
    <text x="2175" y="72" text-anchor="end" class="display" font-size="42" font-weight="900" fill="#3B1F6B">littlelabcoats.co</text>
  </g>
</svg>

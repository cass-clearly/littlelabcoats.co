<svg xmlns="http://www.w3.org/2000/svg" width="2550" height="3300" viewBox="0 0 2550 3300" role="img" aria-labelledby="title desc">
  <title id="title">Measurement Conversions</title>
  <desc id="desc">Quick references for hands-on family science</desc>
  <defs>
    <linearGradient id="paperBg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f9fffe"/><stop offset=".52" stop-color="#ffffff"/><stop offset="1" stop-color="#f3e8ff"/></linearGradient>
    <linearGradient id="topWash" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#ff6b6b" stop-opacity=".22"/><stop offset=".50" stop-color="#4ecdc4" stop-opacity=".18"/><stop offset="1" stop-color="#5a3490" stop-opacity=".20"/></linearGradient>
    <filter id="softShadow" x="-15%" y="-15%" width="130%" height="130%"><feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#3b1f6b" flood-opacity=".14"/></filter>
    <filter id="tinyShadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#3b1f6b" flood-opacity=".12"/></filter>
    <marker id="arrow" markerWidth="18" markerHeight="18" refX="14" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L14,6 L2,10 Z" fill="#3B1F6B"/></marker>
    <marker id="arrowTeal" markerWidth="18" markerHeight="18" refX="14" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L14,6 L2,10 Z" fill="#35B8AF"/></marker>
    <style>
      .display{font-family:Georgia,'Times New Roman',serif} .sans{font-family:Arial,Helvetica,sans-serif} .navy{fill:#3B1F6B} .muted{fill:#5A7A78} .white{fill:#fff} .label{font-family:Arial,Helvetica,sans-serif;font-weight:900;letter-spacing:.03em} .small{font-size:32px} .body{font-size:42px} .caption{font-size:30px;font-weight:700} .titleText{font-size:96px;font-weight:900} .cardTitle{font-size:48px;font-weight:900} .tiny{font-size:26px}
    </style>
  </defs>
  <rect width="2550" height="3300" fill="url(#paperBg)"/>
  <rect width="2550" height="470" fill="url(#topWash)"/>
  <circle cx="230" cy="210" r="120" fill="#d4f5f3" opacity=".72"/><circle cx="2315" cy="270" r="145" fill="#ffe8e8" opacity=".72"/><circle cx="2105" cy="135" r="64" fill="#fef3c7" opacity=".75"/>
  <text x="1275" y="178" text-anchor="middle" class="display titleText navy">Measurement Conversions</text>
  <text x="1275" y="256" text-anchor="middle" class="sans body muted">Quick references for hands-on family science</text>
  <text x="1275" y="322" text-anchor="middle" class="sans small muted">Little Lab Coats free printable · personal/family/classroom use</text>
<g transform="translate(160,475)" filter="url(#softShadow)"><rect width="2230" height="2520" rx="58" fill="#fff" stroke="#c8f0ed" stroke-width="5"/></g><g transform="translate(300,700)"><rect width="900" height="500" rx="34" fill="#D4F5F3" stroke="#C8F0ED" stroke-width="4" filter="url(#tinyShadow)"/><text x="42" y="68" class="sans cardTitle" fill="#3B1F6B">Length</text><text x="42" y="126" class="sans body muted">1 centimeter (cm) = 10 millimeters (mm)</text><text x="42" y="184" class="sans body muted">1 meter (m) = 100 centimeters</text><text x="42" y="242" class="sans body muted">1 kilometer (km) = 1,000 meters</text></g><g transform="translate(1290,700)"><rect width="900" height="500" rx="34" fill="#FFE8E8" stroke="#C8F0ED" stroke-width="4" filter="url(#tinyShadow)"/><text x="42" y="68" class="sans cardTitle" fill="#3B1F6B">Mass</text><text x="42" y="126" class="sans body muted">1 gram (g) = 1,000 milligrams (mg)</text><text x="42" y="184" class="sans body muted">1 kilogram (kg) = 1,000 grams</text><text x="42" y="242" class="sans body muted">A nickel is about 5 grams</text></g><g transform="translate(300,1350)"><rect width="900" height="500" rx="34" fill="#FEF3C7" stroke="#C8F0ED" stroke-width="4" filter="url(#tinyShadow)"/><text x="42" y="68" class="sans cardTitle" fill="#3B1F6B">Volume</text><text x="42" y="126" class="sans body muted">1 liter (L) = 1,000 milliliters (mL)</text><text x="42" y="184" class="sans body muted">1 tablespoon = 3 teaspoons</text><text x="42" y="242" class="sans body muted">1 cup = 8 fluid ounces</text></g><g transform="translate(1290,1350)"><rect width="900" height="500" rx="34" fill="#fbf7ff" stroke="#C8F0ED" stroke-width="4" filter="url(#tinyShadow)"/><text x="42" y="68" class="sans cardTitle" fill="#3B1F6B">Temperature</text><text x="42" y="126" class="sans body muted">Water freezes at 0°C / 32°F</text><text x="42" y="184" class="sans body muted">Room temperature is about 20–22°C</text><text x="42" y="242" class="sans body muted">Water boils near 100°C / 212°F at sea level</text></g><g transform="translate(430,2060)"><rect width="1690" height="360" rx="42" fill="#fff" stroke="#C8F0ED" stroke-width="4" filter="url(#tinyShadow)"/><text x="845" y="82" text-anchor="middle" class="display" font-size="58" font-weight="900" fill="#3B1F6B">Metric ladder</text><text x="250" y="185" class="sans cardTitle" fill="#3B1F6B">kilo</text><text x="565" y="185" class="sans cardTitle" fill="#3B1F6B">base</text><text x="920" y="185" class="sans cardTitle" fill="#3B1F6B">centi</text><text x="1265" y="185" class="sans cardTitle" fill="#3B1F6B">milli</text><text x="250" y="250" class="sans body muted">1,000×</text><text x="565" y="250" class="sans body muted">m · g · L</text><text x="920" y="250" class="sans body muted">1/100</text><text x="1265" y="250" class="sans body muted">1/1,000</text></g><g transform="translate(430,2525)"><rect width="1690" height="270" rx="34" fill="#fff" stroke="#C8F0ED" stroke-width="4" filter="url(#tinyShadow)"/><text x="42" y="68" class="sans cardTitle" fill="#3B1F6B">Parent note</text><text x="42" y="126" class="sans body muted">Use the exact directions in a lesson when precision matters. This chart is a quick helper</text><text x="42" y="184" class="sans body muted">for everyday measuring, estimating, and notebook conversions.</text></g>  <g transform="translate(160,3070)">
    <rect x="0" y="0" width="2230" height="115" rx="36" fill="#ffffff" stroke="#C8F0ED" stroke-width="4"/>
    <text x="56" y="72" class="sans small muted">Little Lab Coats · Free science resource · Print in color when possible</text>
    <text x="2175" y="72" text-anchor="end" class="display" font-size="42" font-weight="900" fill="#3B1F6B">littlelabcoats.co</text>
  </g>
</svg>

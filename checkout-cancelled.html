<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout Cancelled — Little Lab Coats</title>
  <link rel="icon" type="image/png" sizes="32x32" href="images/site/favicon-32x32.png" />
  <link rel="apple-touch-icon" href="images/site/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cream:#F9FFFE;
      --coral:#FF6B6B;
      --navy:#3B1F6B;
      --teal:#4ECDC4;
      --border:#C8F0ED;
      --text-muted:#5A7A78;
      --white:#FFFFFF;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Lato', sans-serif;
      background: linear-gradient(180deg, #fffdfa 0%, #f6fbff 100%);
      color: var(--navy);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: min(680px, 100%);
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 34px 28px;
      box-shadow: 0 18px 44px rgba(43,58,103,0.12);
      text-align: center;
    }
    img { height: 76px; width: auto; margin: 0 auto 12px; display: block; }
    h1 {
      margin: 0 0 10px;
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(2rem, 5vw, 2.6rem);
    }
    p {
      margin: 0 auto 18px;
      max-width: 560px;
      color: var(--text-muted);
      line-height: 1.75;
    }
    .actions {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin-top: 20px;
    }
    .btn {
      display: inline-block;
      text-decoration: none;
      font-weight: 700;
      border-radius: 12px;
      padding: 14px 18px;
    }
    .btn-primary { background: var(--coral); color: white; }
    .btn-secondary { background: var(--teal); color: white; }
  </style>
</head>
<body>
  <main class="card">
    <img src="images/site/llc-logo-serena-approved-2026-04-10.png" alt="Little Lab Coats" />
    <h1>Checkout cancelled</h1>
    <p>No charge was completed. If you still want Little Lab Coats access, head back to the store and restart checkout when you're ready.</p>
    <div class="actions">
      <a class="btn btn-primary" href="store.html#all-access-annual">Return to the store</a>
      <a class="btn btn-secondary" href="curriculum.html">Keep browsing lessons</a>
    </div>
  </main>
</body>
</html>

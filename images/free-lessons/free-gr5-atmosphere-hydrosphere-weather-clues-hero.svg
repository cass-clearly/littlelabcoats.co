<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Atmosphere and hydrosphere weather clues investigation</title>
  <desc id="desc">A colorful tabletop weather model showing warm water evaporating, cold ice condensing droplets, wind arrows, clouds, and a student observation notebook.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#bde9ff"/>
      <stop offset="0.58" stop-color="#eaf8ff"/>
      <stop offset="1" stop-color="#fff4df"/>
    </linearGradient>
    <linearGradient id="water" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="table" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#ffe8b5"/>
      <stop offset="1" stop-color="#ffd6a5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>
  <rect width="1400" height="900" fill="url(#sky)"/>
  <circle cx="205" cy="150" r="72" fill="#facc15" opacity="0.95"/>
  <g stroke="#fbbf24" stroke-width="12" stroke-linecap="round" opacity="0.65">
    <path d="M205 38v-28"/><path d="M205 290v-28"/><path d="M93 150H62"/><path d="M348 150h-31"/><path d="M126 70l-22-22"/><path d="M286 230l22 22"/><path d="M284 70l22-22"/><path d="M126 230l-22 22"/>
  </g>
  <g opacity="0.9">
    <ellipse cx="1020" cy="135" rx="115" ry="42" fill="#fff"/>
    <ellipse cx="1110" cy="150" rx="88" ry="38" fill="#fff"/>
    <ellipse cx="945" cy="165" rx="86" ry="36" fill="#fff"/>
    <ellipse cx="1035" cy="180" rx="170" ry="42" fill="#fff"/>
  </g>
  <g stroke="#60a5fa" stroke-width="8" stroke-linecap="round" opacity="0.75">
    <path d="M1070 237c-18 26-18 48 0 68"/><path d="M1140 237c-18 26-18 48 0 68"/><path d="M1000 237c-18 26-18 48 0 68"/>
  </g>
  <g fill="none" stroke="#38bdf8" stroke-width="12" stroke-linecap="round" opacity="0.75">
    <path d="M92 435 C230 380, 326 498, 470 430"/>
    <path d="M915 410 C1062 348, 1165 460, 1320 390"/>
  </g>
  <rect y="615" width="1400" height="285" fill="url(#table)"/>
  <ellipse cx="700" cy="645" rx="420" ry="64" fill="#c084fc" opacity="0.16"/>
  <g filter="url(#shadow)">
    <rect x="400" y="275" width="600" height="385" rx="42" fill="#ffffff" stroke="#0284c7" stroke-width="8"/>
    <rect x="430" y="505" width="540" height="125" rx="26" fill="url(#water)"/>
    <path d="M435 536 C525 490, 595 552, 690 520 C790 487, 842 550, 970 514 L970 630 L430 630 Z" fill="#67e8f9" opacity="0.65"/>
    <rect x="505" y="245" width="390" height="54" rx="24" fill="#e0f2fe" stroke="#0284c7" stroke-width="6"/>
    <rect x="585" y="205" width="230" height="58" rx="14" fill="#dbeafe" stroke="#60a5fa" stroke-width="5"/>
    <g fill="#38bdf8" opacity="0.82">
      <circle cx="610" cy="318" r="11"/><circle cx="645" cy="340" r="8"/><circle cx="725" cy="322" r="10"/><circle cx="780" cy="350" r="8"/><circle cx="840" cy="318" r="12"/>
    </g>
    <g stroke="#0ea5e9" stroke-width="8" stroke-linecap="round" opacity="0.65">
      <path d="M610 483 C570 438, 580 400, 620 366"/><path d="M700 482 C670 430, 690 392, 733 356"/><path d="M800 482 C772 430, 805 394, 848 358"/>
    </g>
    <g fill="#fff" opacity="0.84">
      <ellipse cx="520" cy="384" rx="45" ry="20"/><ellipse cx="555" cy="392" rx="55" ry="24"/><ellipse cx="500" cy="407" rx="55" ry="18"/>
      <ellipse cx="900" cy="398" rx="50" ry="22"/><ellipse cx="850" cy="412" rx="62" ry="25"/><ellipse cx="930" cy="424" rx="60" ry="19"/>
    </g>
  </g>
  <g transform="translate(92 620) rotate(-4)" filter="url(#shadow)">
    <rect width="305" height="185" rx="18" fill="#ffffff" stroke="#f59e0b" stroke-width="5"/>
    <rect x="24" y="26" width="165" height="20" rx="10" fill="#bae6fd"/>
    <rect x="24" y="66" width="250" height="10" rx="5" fill="#e5e7eb"/>
    <rect x="24" y="94" width="250" height="10" rx="5" fill="#e5e7eb"/>
    <rect x="24" y="122" width="180" height="10" rx="5" fill="#e5e7eb"/>
    <circle cx="245" cy="42" r="24" fill="#facc15"/>
    <path d="M220 133 l22 22 44-60" fill="none" stroke="#10b981" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g transform="translate(1030 612) rotate(5)" filter="url(#shadow)">
    <rect width="235" height="155" rx="20" fill="#ffffff" stroke="#22c55e" stroke-width="5"/>
    <text x="118" y="42" font-family="Arial, sans-serif" font-size="24" font-weight="800" fill="#0f766e" text-anchor="middle">WEATHER CLUES</text>
    <g font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#334155">
      <text x="32" y="82">☁ cloud cover</text>
      <text x="32" y="112">💧 droplets</text>
      <text x="32" y="142">💨 wind</text>
    </g>
  </g>
  <g font-family="Arial, sans-serif" font-weight="800">
    <rect x="420" y="704" width="214" height="48" rx="24" fill="#ecfeff" stroke="#06b6d4" stroke-width="3"/>
    <text x="527" y="735" font-size="22" fill="#0e7490" text-anchor="middle">hydrosphere</text>
    <rect x="724" y="704" width="214" height="48" rx="24" fill="#eff6ff" stroke="#3b82f6" stroke-width="3"/>
    <text x="831" y="735" font-size="22" fill="#1d4ed8" text-anchor="middle">atmosphere</text>
  </g>
  <text x="700" y="840" font-family="Arial, sans-serif" font-size="38" font-weight="900" fill="#123047" text-anchor="middle">Make a tiny weather system. Collect real clues.</text>
</svg>

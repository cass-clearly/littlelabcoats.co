  <a class="back-link" href="gr1-ps4-unit1-lesson1-sound-is-vibration.html">← Back to Lesson 1: Sound Is Vibration</a>

  <div class="quiz-header">
    <h1>🔊 Sound &amp; Light Quiz 💡</h1>
    <p>Physical Science · Unit 1 · Grade 1</p>
  </div>

  <div class="score-bar" id="scoreBar">
    Score: <span id="scoreNum">0</span> / <span id="totalNum">10</span> &nbsp;|&nbsp; Questions answered: <span id="answeredNum">0</span>
  </div>

  <div id="quizContainer"></div>

  <div class="results-panel" id="resultsPanel">
    <div class="results-emoji" id="resultsEmoji"></div>
    <h2>Quiz Complete! 🎉</h2>
    <div class="results-score" id="resultsScore"></div>
    <div class="results-msg" id="resultsMsg"></div>
    <br>
    <button class="retry-btn" onclick="resetQuiz()">🔄 Try Again</button>
  </div>

  <script>
    const questions = [
      {
        q: "🎵 What causes ALL sounds?",
        options: ["Moving air through a fan", "Vibrations — things moving back and forth very fast", "Electricity flowing through a wire", "Heat from the sun"],
        correct: 1,
        explanation: "Every sound is made by vibrations! When something vibrates (moves quickly back and forth), it creates sound waves in the air that travel to your ears."
      },
      {
        q: "🎸 You pluck a rubber band and it makes a sound. Then you press it to stop it from moving. What happens to the sound?",
        options: ["It gets louder", "It keeps going for a while", "It stops immediately", "It changes pitch"],
        correct: 2,
        explanation: "The sound stops immediately! When you stop the vibration, you stop the sound. No vibration = no sound. That's the proof that sound is caused by vibrations."
      },
      {
        q: "🎹 You have two rubber bands — one thick and one thin. When you pluck them, which one makes a HIGHER pitch sound?",
        options: ["The thick rubber band", "The thin rubber band", "They both sound the same", "Pitch has nothing to do with thickness"],
        correct: 1,
        explanation: "The thin rubber band makes a higher pitch! Thin bands vibrate faster than thick bands. Faster vibrations = higher pitch. This is how guitars make different notes!"
      },
      {
        q: "🔊 You bang a drum SOFTLY, then HARD. What changes about the sound?",
        options: ["The pitch gets higher", "The sound gets louder (more volume)", "The sound gets faster", "Nothing changes"],
        correct: 1,
        explanation: "Hitting harder makes bigger vibrations, and bigger vibrations = louder sound! Volume (how loud or quiet) depends on how big the vibrations are."
      },
      {
        q: "🔦 You shine a flashlight across a dark room. How does the light travel?",
        options: ["In a curved path around objects", "In a straight line", "It bounces in all directions at once", "It swirls like water"],
        correct: 1,
        explanation: "Light always travels in a straight line — that's one of its most important properties! It cannot bend around corners. That's why you can't see around a wall."
      },
      {
        q: "🪟 You hold plastic wrap in front of a flashlight. Light passes through clearly and you can see objects on the other side. What word describes plastic wrap?",
        options: ["Opaque", "Translucent", "Transparent", "Reflective"],
        correct: 2,
        explanation: "Transparent means ALL light passes through and you can see clearly! Examples: clear glass, plastic wrap, a clear window."
      },
      {
        q: "🧻 You hold wax paper in front of a flashlight. Some light gets through, but everything looks blurry — not clear. What word describes wax paper?",
        options: ["Transparent", "Translucent", "Opaque", "Reflective"],
        correct: 1,
        explanation: "Translucent means SOME light gets through but it's blurry — you can't see clearly. Examples: wax paper, tissue paper, frosted glass."
      },
      {
        q: "📦 You hold a piece of cardboard in front of a flashlight. No light gets through at all — a dark shadow appears behind it. What word describes cardboard?",
        options: ["Transparent", "Translucent", "Opaque", "Luminous"],
        correct: 2,
        explanation: "Opaque means light is BLOCKED completely — you can't see through it at all. Examples: cardboard, wood, your hand, aluminum foil."
      },
      {
        q: "🪞 You use a mirror to bounce a beam of light onto a different spot on the wall. What is this called?",
        options: ["Translucent", "Absorption", "Reflection", "Vibration"],
        correct: 2,
        explanation: "Reflection! When light hits a shiny surface like a mirror, it bounces (reflects) in a new direction. Sailors and hikers have used mirror reflections to send signals over long distances!"
      },
      {
        q: "📡 People have used light and sound to send messages for thousands of years. Which TWO things below are examples of using light or sound to communicate across a distance?",
        options: ["Flashing a mirror signal ✦ Drum code beats", "Writing a letter ✦ Drawing a picture", "Building a fire to cook food ✦ Humming quietly to yourself", "Eating lunch ✦ Taking a nap"],
        correct: 0,
        explanation: "Flashing mirrors use reflected light to send signals! Drum codes use sound vibrations to carry messages far away. Humans have used both for thousands of years — long before phones existed!"
      }
    ];

    let score = 0;
    let answered = 0;

    function buildQuiz() {
      const container = document.getElementById('quizContainer');
      container.innerHTML = '';
      questions.forEach((q, i) => {
        const card = document.createElement('div');
        card.className = 'question-card';
        card.id = `card${i}`;
        card.innerHTML = `
          <div class="q-number">Question ${i + 1} of ${questions.length}</div>
          <div class="question-text">${q.q}</div>
          <div class="options" id="opts${i}">
            ${q.options.map((opt, j) => `
              <button class="option-btn" onclick="answer(${i}, ${j})" id="opt${i}_${j}">${opt}</button>
            `).join('')}
          </div>
          <div class="feedback-box" id="fb${i}"></div>
        `;
        container.appendChild(card);
      });
    }

    function answer(qIdx, choiceIdx) {
      const q = questions[qIdx];
      const optsDiv = document.getElementById(`opts${qIdx}`);
      const fb = document.getElementById(`fb${qIdx}`);
      const buttons = optsDiv.querySelectorAll('.option-btn');

      // Disable all buttons
      buttons.forEach(b => b.disabled = true);

      if (choiceIdx === q.correct) {
        buttons[choiceIdx].classList.add('correct');
        fb.className = 'feedback-box correct-fb';
        fb.innerHTML = `✅ <strong>Correct!</strong> ${q.explanation}`;
        score++;
      } else {
        buttons[choiceIdx].classList.add('wrong');
        buttons[q.correct].classList.add('correct');
        fb.className = 'feedback-box wrong-fb';
        fb.innerHTML = `❌ <strong>Not quite!</strong> The correct answer is: <strong>${q.options[q.correct]}</strong>. ${q.explanation}`;
      }
      fb.style.display = 'block';
      answered++;
      updateScore();

      if (answered === questions.length) {
        setTimeout(showResults, 800);
      }
    }

    function updateScore() {
      document.getElementById('scoreNum').textContent = score;
      document.getElementById('answeredNum').textContent = answered;
    }

    function showResults() {
      document.getElementById('resultsPanel').style.display = 'block';
      document.getElementById('resultsScore').textContent = `${score} / ${questions.length}`;
      document.getElementById('resultsPanel').scrollIntoView({ behavior: 'smooth' });

      const pct = score / questions.length;
      let emoji, msg;
      if (pct === 1)       { emoji = '🏆'; msg = "Perfect score! You are a Sound & Light superstar! 🌟 You know your vibrations, your transparent from your opaque, and how to send signals like a scientist!"; }
      else if (pct >= 0.8) { emoji = '⭐'; msg = "Amazing job! You really understand sound and light! Review the one or two you missed and you'll have it all."; }
      else if (pct >= 0.6) { emoji = '😊'; msg = "Good work! You've learned a lot about sound and light. Go back and re-read the lessons, then try again!"; }
      else if (pct >= 0.4) { emoji = '🌱'; msg = "Nice try! Science takes practice. Go back through the lessons and you'll do even better next time!"; }
      else                 { emoji = '💪'; msg = "Keep going! Every scientist starts somewhere. Re-read the lessons and give it another shot — you've got this!"; }

      document.getElementById('resultsEmoji').textContent = emoji;
      document.getElementById('resultsMsg').textContent = msg;
    }

    function resetQuiz() {
      score = 0;
      answered = 0;
      updateScore();
      document.getElementById('resultsPanel').style.display = 'none';
      buildQuiz();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    buildQuiz();
  </script>

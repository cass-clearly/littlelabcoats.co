<div class="quiz-header">
  <h1>🧪 Test Your Knowledge — Kitchen Chemistry</h1>

<div class="score-bar">

</div>

<div class="quiz-body">

  <a href="gr5-ps1-lesson1-reactants-products-mixtures.html" class="back-link">← Back to Kitchen Chemistry Lesson</a>

  <div id="questions-container" style="margin-top: 20px;"></div>

  <button class="see-score-btn" onclick="showResults()">📊 See Your Score</button>

  <div class="results-section" id="resultsBox">
    <div style="font-size:2.5rem; margin-bottom: 4px;">🏆</div>
    <div class="score-display" id="finalScore"></div>
    <div class="encouragement" id="encouragementMsg"></div>

      <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>

    <a href="gr5-ps1-lesson1-reactants-products-mixtures.html" class="back-link">← Back to Kitchen Chemistry Lesson</a>
  </div>

</div>

<script>
const questions = [
  {
    q: "What is a reactant?",
    options: [
      "A new substance formed during a reaction",
      "A starting substance that enters a chemical reaction",
      "Any substance that can be mixed with another",
      "A substance that prevents reactions from happening"
    ],
    correct: 1,
    explanation: "A reactant is a starting substance that enters a chemical reaction. It gets used up during the reaction to form new products. In the baking soda + vinegar experiment, both baking soda and vinegar are the reactants."
  },
  {
    q: "Which observation is the BEST evidence that a chemical reaction has occurred?",
    options: [
      "Two substances are mixed together",
      "The mixture becomes cloudy",
      "A gas is produced and the temperature drops",
      "One substance dissolves in another"
    ],
    correct: 2,
    explanation: "Producing a gas AND a temperature change together are strong signs of a chemical reaction. Simply mixing things, getting cloudy, or dissolving can happen in mixtures too — but gas production and temperature change together strongly indicate new substances are forming."
  },
  {
    q: "You mix salt into water and it disappears. What happened?",
    options: [
      "A chemical reaction occurred — the salt became water",
      "The salt was destroyed by the water",
      "The salt dissolved — it's still there, just mixed in (a mixture)",
      "The water reacted with the salt to form a new substance"
    ],
    correct: 2,
    explanation: "When salt dissolves in water, it's still salt — it just breaks into tiny particles too small to see. This is a mixture, not a reaction. You could get the salt back by evaporating the water. No new substance was formed."
  },
  {
    q: "Baking soda + vinegar produces bubbles and the mixture gets cooler. What are the bubbles made of?",
    options: [
      "Hydrogen gas",
      "Water vapor",
      "Carbon dioxide gas",
      "Oxygen gas"
    ],
    correct: 2,
    explanation: "The bubbles are carbon dioxide (CO₂) gas — one of the products of the reaction. The word equation is: Baking Soda + Vinegar → Carbon Dioxide + Water + Sodium Acetate. The cooling happens because this is an endothermic reaction that absorbs heat energy."
  },
  {
    q: "What makes the baking soda + vinegar reaction different from mixing salt + water?",
    options: [
      "Baking soda + vinegar produces heat; salt + water does not",
      "Baking soda + vinegar forms a new substance that can't be separated back; salt + water can be separated",
      "Salt + water is more dangerous",
      "There is no difference — both are chemical reactions"
    ],
    correct: 1,
    explanation: "The key difference is that baking soda + vinegar is a chemical reaction: new substances form (CO₂, water, sodium acetate) and you can't reverse it. Salt + water is a mixture: the salt just dissolves and you can get it back by evaporating the water."
  },
  {
    q: "When vinegar is added to milk, a rubbery solid forms. What is this solid?",
    options: [
      "Curdled fat from the milk",
      "Casein protein that changed shape permanently",
      "A mixture of vinegar and milk powder",
      "Sugar crystals from the milk"
    ],
    correct: 1,
    explanation: "The rubbery solid is casein — a protein in milk that permanently changes shape (denatures) when it contacts the acid in vinegar. This is a chemical reaction: the casein has new properties and cannot be turned back into liquid milk."
  },
  {
    q: "In a chemical reaction, what happens to the atoms?",
    options: [
      "Atoms are destroyed and new atoms are created",
      "Atoms disappear into the products",
      "Atoms rearrange into new molecules, but no atoms are created or destroyed",
      "Atoms multiply to make more products than reactants"
    ],
    correct: 2,
    explanation: "This is the law of conservation of mass: atoms are never created or destroyed in a chemical reaction. The same atoms that were in the reactants are still there in the products — they just rearrange into new combinations (new molecules)."
  },
  {
    q: "Which of these is a MIXTURE (not a chemical reaction)?",
    options: [
      "Baking soda + vinegar → fizzing",
      "Iron + oxygen → rust",
      "Sand + water → sand settles to the bottom",
      "Milk + vinegar → curds form"
    ],
    correct: 2,
    explanation: "Sand and water is a mixture — the sand just settles out because it doesn't dissolve. You could filter or pour off the water to get the sand back. No new substance is formed. Rust, fizzing baking soda, and curds are all new substances formed by chemical reactions."
  },
  {
    q: "A student adds water to a mystery powder and it fizzes. Then she adds vinegar and it fizzes even more. Which powder is it most likely?",
    options: [
      "Baking soda (sodium bicarbonate)",
      "Baking powder (baking soda + cream of tartar)",
      "Sugar",
      "Salt"
    ],
    correct: 1,
    explanation: "Baking powder fizzes with water alone because it already contains an acid (cream of tartar) inside it — adding water is enough to start the reaction. Plain baking soda won't fizz with just water; it needs an external acid. Fizzing with water = baking powder."
  },
  {
    q: "What does \"conservation of mass\" mean in a chemical reaction?",
    options: [
      "Reactions always create more mass than they started with",
      "Some mass is always lost as heat",
      "The total mass of products equals the total mass of reactants",
      "Mass is only conserved in mixtures, not reactions"
    ],
    correct: 2,
    explanation: "Conservation of mass means the total amount of matter doesn't change in a chemical reaction. If you start with 10 grams of reactants, you end up with 10 grams of products — atoms are just rearranged, not created or lost. This is a fundamental law of chemistry."
  }
];

let answered = {};

function renderQuestions() {
  const container = document.getElementById('questions-container');
  questions.forEach((q, i) => {
    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = 'q-card-' + i;

    const optionsHTML = q.options.map((opt, j) => `
      <li>
        <button class="option-btn" id="opt-${i}-${j}" onclick="selectAnswer(${i}, ${j})">
          <span class="option-icon" id="icon-${i}-${j}">○</span>
          <span>${opt}</span>
        </button>
      </li>
    `).join('');

    card.innerHTML = `
      <div class="q-number">Question ${i + 1} of ${questions.length}</div>
      <div class="q-text">${q.q}</div>
      <ul class="options-list">${optionsHTML}</ul>
      <div class="explanation" id="exp-${i}">${q.explanation}</div>
    `;
    container.appendChild(card);
  });
}

function selectAnswer(qIndex, optIndex) {
  const q = questions[qIndex];

  // If previously answered, undo that score
  if (answered[qIndex] !== undefined) {
    // Reset all options for this question
    for (let j = 0; j < q.options.length; j++) {
      const btn = document.getElementById('opt-' + qIndex + '-' + j);
      const icon = document.getElementById('icon-' + qIndex + '-' + j);
      btn.className = 'option-btn';
      icon.textContent = '○';
    }
  }

  const isCorrect = optIndex === q.correct;
  const selectedBtn = document.getElementById('opt-' + qIndex + '-' + optIndex);
  const selectedIcon = document.getElementById('icon-' + qIndex + '-' + optIndex);

  if (isCorrect) {
    selectedBtn.className = 'option-btn correct';
    selectedIcon.textContent = '✅';
    answered[qIndex] = true;
  } else {
    selectedBtn.className = 'option-btn wrong';
    selectedIcon.textContent = '❌';
    answered[qIndex] = false;
    // Reveal correct answer
    const correctBtn = document.getElementById('opt-' + qIndex + '-' + q.correct);
    const correctIcon = document.getElementById('icon-' + qIndex + '-' + q.correct);
    correctBtn.className = 'option-btn revealed-correct';
    correctIcon.textContent = '✅';
  }

  // Show explanation
  document.getElementById('exp-' + qIndex).classList.add('show');

  updateScore();
}

function updateScore() {
  const correctCount = Object.values(answered).filter(v => v === true).length;
  const totalAnswered = Object.keys(answered).length;
  document.getElementById('scoreDisplay').textContent = correctCount;
  document.getElementById('answeredDisplay').textContent = totalAnswered;
}

function showResults() {
  updateScore();
  const correctCount = Object.values(answered).filter(v => v === true).length;
  const resultsBox = document.getElementById('resultsBox');
  const finalScore = document.getElementById('finalScore');
  const msg = document.getElementById('encouragementMsg');
  const progressFill = document.getElementById('progressFill');

  finalScore.textContent = correctCount + ' / 10';
  progressFill.style.width = (correctCount * 10) + '%';

  if (correctCount === 10) {
    msg.textContent = "Perfect score! You're a chemistry genius! 🧪✨";
  } else if (correctCount >= 8) {
    msg.textContent = "Excellent work — you really know your chemistry! 🎉";
  } else if (correctCount >= 6) {
    msg.textContent = "Good job! Review the lesson and try again to master it.";
  } else if (correctCount >= 4) {
    msg.textContent = "Keep going! Read through the lesson again and you'll get there.";
  } else {
    msg.textContent = "Chemistry takes practice — go back to the lesson and try again!";
  }

  resultsBox.classList.add('show');
  resultsBox.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

renderQuestions();
</script>

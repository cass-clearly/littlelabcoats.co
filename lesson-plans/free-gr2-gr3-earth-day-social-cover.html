<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Earth Day Freebie Social Cover</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      width: 1200px;
      height: 630px;
      margin: 0;
      overflow: hidden;
      background: #f4fbfa;
      font-family: 'Lato', Arial, sans-serif;
    }
    .cover {
      width: 1200px;
      height: 630px;
      position: relative;
      overflow: hidden;
      display: grid;
      grid-template-columns: 1.05fr .95fr;
      background:
        radial-gradient(circle at top left, rgba(255,202,40,.26), transparent 28%),
        radial-gradient(circle at bottom left, rgba(78,205,196,.22), transparent 34%),
        linear-gradient(135deg, #fffaf2 0%, #f4fffd 46%, #eef8ff 100%);
    }
    .copy {
      padding: 40px 42px 30px 52px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      z-index: 2;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      align-self: flex-start;
      gap: 10px;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,0.84);
      border: 2px solid rgba(255,138,101,0.35);
      color: #8d4c13;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: .06em;
      text-transform: uppercase;
      box-shadow: 0 10px 24px rgba(59,31,107,.08);
      margin-bottom: 14px;
    }
    h1 {
      margin: 0 0 12px;
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 58px;
      line-height: 1.02;
      color: #1f5f34;
    }
    .sub {
      font-size: 24px;
      line-height: 1.3;
      color: #41505d;
      margin-bottom: 16px;
      max-width: 560px;
    }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 14px;
    }
    .chip {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.9);
      border: 1.5px solid rgba(59,31,107,.10);
      color: #3B1F6B;
      font-size: 18px;
      font-weight: 700;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 4px;
      color: #3B1F6B;
      font-size: 24px;
      font-weight: 800;
    }
    .brand img {
      width: 54px;
      height: 54px;
      object-fit: contain;
      background: rgba(255,255,255,0.9);
      border-radius: 16px;
      padding: 8px;
      box-shadow: 0 10px 24px rgba(59,31,107,.10);
    }
    .art {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px 34px 24px 0;
    }
    .art-card {
      width: 470px;
      height: 470px;
      border-radius: 34px;
      background: white;
      border: 2px solid rgba(46,125,50,.12);
      box-shadow: 0 18px 48px rgba(59,31,107,.12);
      transform: rotate(2deg);
      overflow: hidden;
      position: relative;
    }
    .art-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .art-ribbon {
      position: absolute;
      left: 22px;
      bottom: 22px;
      padding: 12px 16px;
      border-radius: 18px;
      background: rgba(255,255,255,.92);
      color: #3B1F6B;
      font-size: 20px;
      font-weight: 800;
      box-shadow: 0 10px 24px rgba(59,31,107,.12);
    }
  </style>
</head>
<body>
  <div class="cover">
    <div class="copy">
      <div class="badge">🎁 Free Earth Day Download</div>
      <h1>Recycling Sort + Earth Helper Pledge</h1>
      <div class="sub">A polished Grades 2–3 Earth Day printable for homeschool families and classrooms.</div>
      <div class="chips">
        <div class="chip">♻️ Sorting cards</div>
        <div class="chip">🌱 Discussion prompts</div>
        <div class="chip">💚 Printable pledge</div>
      </div>
      <div class="brand">
        <img src="../images/site/llc-logo-serena-approved-400.png" alt="Little Lab Coats logo">
        <span>Little Lab Coats</span>
      </div>
    </div>
    <div class="art">
      <div class="art-card">
        <img src="../images/lesson-plans/free-earth-day-recycling-hero-gemini.jpg" alt="Children sorting recycling outdoors">
        <div class="art-ribbon">Tomorrow-ready Earth Day freebie</div>
      </div>
    </div>
  </div>
</body>
</html>
